<!DOCTYPE html>
<html>
<head>
<title>Date Selector with Text Attribute</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:150px;
}

input{
    padding:10px;
    font-size:16px;
}
</style>

</head>

<body>

<h2>Date Selector</h2>

<input 
type="text"
id="dateInput"
name="dateInput"
placeholder="Select Date"
title="Select Date"
onfocus="(this.type='date')"
onblur="if(!this.value)this.type='text'"
>

</body>
</html>
