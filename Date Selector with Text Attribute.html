<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date Selector NLP Test</title>
<style>
body { font-family: Arial; margin: 40px; }
.container { width: 300px; padding: 20px; border:1px solid #ccc; border-radius:8px; }
.hidden { display:none; }
label { font-weight: bold; }
</style>
<script>
function showDateSelector() {
    setTimeout(function() {
        const dateInput = document.getElementById("date");
        dateInput.style.display = "block";
        dateInput.setAttribute("data-text", "date selector"); // use data-text for NLP
    }, 3000);
}
window.onload = showDateSelector;
</script>
</head>
<body>

<h2>Date Selector NLP Test</h2>
<div class="container">

<div id="dateField">
    <label for="date" data-label="date selector">Select Date</label><br><br>
    <input
        type="date"
        id="date"
        name="date"
        placeholder="Select a date"
        title="date data"
        data-text="date selector"
        style="display:none;"
    >
</div>

</div>
</body>
</html>
