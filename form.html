<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to right, #eef2f7, #d9e4f5);
    }

    .container {
      width: 420px;
      margin: 50px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background-color: #f9fbff;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #e67700;
      background-color: #ffffff;
      outline: none;
      box-shadow: 0 0 5px rgba(0,115,230,0.3);
    }

    input::placeholder {
      color: #888;
    }

    select {
      color: #555;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #0073e6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #005bb5;
    }

    .file-upload {
      background: #f1f5ff;
      padding: 10px;
      border-radius: 6px;
      border: 1px dashed #0073e6;
      margin-bottom: 15px;
    }

  </style>
</head>

<body>

<div class="container">
  <h2>Create Account</h2>

  <form id="registrationForm" name="registrationForm">

    <input type="text" id="firstName" name="fullName"
           placeholder="Enter your firstName" required>
    
    <input type="text" id="lastName" name="fullName"
           placeholder="Enter your lastName" required>

    <input type="email" id="email" name="email"
           placeholder="Enter your email address" required>

    <input type="password" id="password" name="password"
           placeholder="Create a password" required>

    <input type="tel" id="mobileNumber" name="mobileNumber"
           placeholder="Enter your mobile number" required>

    <select id="experience" name="experience" required>
      <option value="">Select experience</option>
      <option value="fresher">Fresher</option>
      <option value="1-3">1-3 Years</option>
      <option value="3-5">3-5 Years</option>
      <option value="5+">5+ Years</option>
    </select>

    <input type="text" id="location" name="location"
           placeholder="Enter your current location">

    <input type="text" id="skills" name="skills"
           placeholder="Enter your key skills">

    <div class="file-upload">
      <input type="file" id="resume" name="resume">
    </div>

    <button type="submit" id="registerBtn" name="registerBtn">
      Register Now
    </button>

  </form>
</div>

</body>
</html>
